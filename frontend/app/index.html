<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>COE 558 Calculator App</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9Oer+R2WICKhnAjAJqHnTXhljQv1io2yVn3p6hW+ALEwIH"
            crossorigin="anonymous"
    >

    <style>
        body {
            min-height: 100vh;
            background:
                    radial-gradient(circle at top left, rgba(13, 110, 253, 0.20), transparent 32rem),
                    linear-gradient(135deg, #f8fafc 0%, #e9eef5 100%);
        }

        .app-shell {
            min-height: 100vh;
        }

        .calculator-card {
            max-width: 680px;
            border: 0;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 1rem 3rem rgba(15, 23, 42, 0.14);
        }

        .hero-section {
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
        }

        .operation-btn {
            min-height: 48px;
            font-weight: 600;
        }

        .result-box {
            min-height: 92px;
            border-radius: 1rem;
            border: 1px dashed #cbd5e1;
            background: #f8fafc;
        }

        .api-badge {
            font-size: 0.78rem;
            word-break: break-all;
        }
    </style>
</head>
<body>
<main class="container app-shell d-flex align-items-center justify-content-center py-5">
    <section class="card calculator-card w-100">
        <div class="hero-section text-white p-4 p-md-5">
            <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">
                <div>
                    <p class="text-uppercase fw-semibold opacity-75 mb-2">COE 558 Cloud Application</p>
                    <h1 class="display-6 fw-bold mb-2">Calculator App</h1>
                    <p class="mb-0 opacity-75">
                        This frontend sends requests to the backend REST API. The calculation is performed by the API, not in the browser.
                    </p>
                </div>
                <div class="text-md-end">
                    <span class="badge rounded-pill text-bg-light text-primary px-3 py-2">Frontend + Backend</span>
                </div>
            </div>
        </div>

        <div class="card-body p-4 p-md-5">
            <div class="alert alert-primary api-badge" role="alert">
                Backend API: <strong>https://api.coe558calculatorappalem.com/calculate</strong>
            </div>

            <form id="calculatorForm" onsubmit="return false;">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label for="num1" class="form-label fw-semibold">First number</label>
                        <input id="num1" type="number" step="any" class="form-control form-control-lg" placeholder="Example: 10" required>
                    </div>
                    <div class="col-md-6">
                        <label for="num2" class="form-label fw-semibold">Second number</label>
                        <input id="num2" type="number" step="any" class="form-control form-control-lg" placeholder="Example: 5" required>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6 col-md-3">
                        <button type="button" class="btn btn-primary w-100 operation-btn" onclick="calculate('add')">Add</button>
                    </div>
                    <div class="col-6 col-md-3">
                        <button type="button" class="btn btn-primary w-100 operation-btn" onclick="calculate('subtract')">Subtract</button>
                    </div>
                    <div class="col-6 col-md-3">
                        <button type="button" class="btn btn-primary w-100 operation-btn" onclick="calculate('multiply')">Multiply</button>
                    </div>
                    <div class="col-6 col-md-3">
                        <button type="button" class="btn btn-primary w-100 operation-btn" onclick="calculate('divide')">Divide</button>
                    </div>
                </div>
            </form>

            <div id="resultBox" class="result-box d-flex align-items-center justify-content-center text-center p-4">
                <span class="text-secondary">Enter two numbers and choose an operation.</span>
            </div>
        </div>
    </section>
</main>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"
></script>

<script>
    const API_URL = "https://api.coe558calculatorappalem.com/calculate";

    function setButtonsDisabled(disabled) {
        document.querySelectorAll("button.operation-btn").forEach((button) => {
            button.disabled = disabled;
        });
    }

    function showResult(type, html) {
        const resultBox = document.getElementById("resultBox");
        resultBox.className = "result-box d-flex align-items-center justify-content-center text-center p-4";

        if (type === "success") {
            resultBox.classList.add("alert", "alert-success", "border-0");
        } else if (type === "error") {
            resultBox.classList.add("alert", "alert-danger", "border-0");
        } else {
            resultBox.classList.add("alert", "alert-secondary", "border-0");
        }

        resultBox.innerHTML = html;
    }

    async function calculate(operation) {
        const num1 = document.getElementById("num1").value;
        const num2 = document.getElementById("num2").value;

        if (num1 === "" || num2 === "") {
            showResult("error", "<strong>Please enter both numbers.</strong>");
            return;
        }

        setButtonsDisabled(true);
        showResult("info", "Calling backend API...");

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    num1: Number(num1),
                    num2: Number(num2),
                    operation: operation
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || data.error || "Request failed.");
            }

            showResult(
                "success",
                `
            <div>
              <div class="fw-bold fs-5 mb-2">Result: ${data.result}</div>
              <div>Operation: <strong>${data.operation}</strong></div>
              <div>Inputs: <strong>${data.num1}</strong> and <strong>${data.num2}</strong></div>
            </div>
          `
            );
        } catch (error) {
            showResult("error", `<strong>Error:</strong> ${error.message}`);
        } finally {
            setButtonsDisabled(false);
        }
    }
</script>
</body>
</html>
